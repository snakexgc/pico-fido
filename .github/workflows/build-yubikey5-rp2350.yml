name: "Build YubiKey5 Emulation for RP2350"

on:
  push:
    branches: [ "main", "development" ]
  workflow_dispatch:

jobs:
  build-yubikey5:
    name: Build YubiKey5 firmware for RP2350
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Setup Pico SDK
        run: |
          git clone https://github.com/raspberrypi/pico-sdk
          cd pico-sdk
          git checkout tags/2.1.1
          git submodule update --init
          cd ..
          git clone https://github.com/raspberrypi/picotool
          cd picotool
          git submodule update --init
          mkdir build
          cd build
          cmake -DPICO_SDK_PATH=../../pico-sdk ..
          make -j$(nproc)
          sudo make install
          cd ../..

      - name: Build firmware for RP2350
        env:
          PICO_SDK_PATH: ../pico-sdk
        run: |
          mkdir -p build_release
          mkdir -p release
          cd build_release
          PICO_SDK_PATH="${PICO_SDK_PATH}" cmake .. -DPICO_BOARD=pico2 -DVIDPID=Yubikey5
          make -j$(nproc)
          mv pico_fido.uf2 ../release/pico_fido_pico2_yubikey5.uf2

      - name: Verify VID/PID
        run: |
          echo "Verifying VID/PID in firmware..."
          echo "Expected: VID=0x1050 (Yubico), PID=0x0407 (YubiKey 5 FIDO)"
          echo ""
          echo "Searching for YubiKey5 VID/PID pattern (50 10 07 04 in little-endian)..."
          if hexdump -C release/pico_fido_pico2_yubikey5.uf2 | grep -q "50 10 07 04"; then
            echo "✓ VID/PID verified: 0x1050:0x0407 (YubiKey5)"
          else
            echo "✗ Warning: YubiKey5 VID/PID pattern not found, checking default..."
            if hexdump -C release/pico_fido_pico2_yubikey5.uf2 | grep -q "8a 2e fe 10"; then
              echo "✗ Found default Raspberry Pi VID/PID: 0x2E8A:0x10FE"
            else
              echo "✗ Could not determine VID/PID"
            fi
          fi
          echo ""
          echo "File info:"
          ls -la release/pico_fido_pico2_yubikey5.uf2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pico_fido_rp2350_yubikey5
          path: release/pico_fido_pico2_yubikey5.uf2
          retention-days: 30

      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: yubikey5-rp2350-${{ github.sha }}
          name: YubiKey5 Emulation for RP2350 (${{ github.sha }})
          body: |
            Automatic build of YubiKey5 emulation firmware for RP2350
            
            **Board:** Pico 2 (RP2350)
            **VID/PID:** 0x1050:0x0407 (YubiKey5)
          artifacts: "release/pico_fido_pico2_yubikey5.uf2"
          draft: false
          prerelease: false
